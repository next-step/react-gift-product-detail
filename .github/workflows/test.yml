# .github/workflows/test.yml
name: CI Test

# 언제 워크플로우가 실행될지 정의
on:
  pull_request:
    branches:
      - whyyhyh        # main 브랜치로 향하는 PR마다
  push:
    branches:
      - whyyhyh        # main 브랜치에 푸시될 때마다

jobs:
  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Node.js 설치 (버전은 필요에 따라 조정)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'     # 프로젝트에 맞춰 변경 가능
          cache: 'npm'           # npm 캐싱 활성화

      # 3. 의존성 설치
      - name: Install dependencies
        run: npm ci

      # 4. 테스트 실행
      - name: Run tests
        run: npm run test:ci
