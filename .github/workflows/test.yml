name: TEST

on:
  push:
    branches: [jaeho-site]
  pull_request:
    branches: [jaeho-site]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      VITE_API_BASE_URL: /api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
