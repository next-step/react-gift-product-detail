name: Run Tests

on:
  push:
    branches: [main shushuburger]
  pull_request:
    branches: [main shushuburger]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      VITE_API_BASE_URL: ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
