name: Test CI

on:
    pull_request:
        branches:
            - main
            - hansekim
    push:
        branches:
            - main
            - hansekim
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install dependencies
              run: npm install --legacy-peer-deps

            - name: Run lint
              run: npm run lint

            - name: Run type check
              run: npx tsc --noEmit

            - name: Run tests
              run: npm run test -- --coverage
              continue-on-error: true