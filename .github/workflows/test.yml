name: hyemomo 브랜치에 pr 보낼때마다 ,push  할 때마다

on:
  pull_request:
    branches: [hyemomo]
  push:
    branches: [step3]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
