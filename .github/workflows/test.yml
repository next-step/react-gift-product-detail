name: Run Tests

on:
  pull_request:
    branches:
      - main
      - byunggil723
  push:
    branches:
      - main
      - byunggil723
      - feature/test-code

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest --run
