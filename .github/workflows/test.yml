name: Run Tests

on:
  pull_request:
    branches:
      - ganimjeong
  push:
    branches:
      - step3
      - ganimjeong
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: yarn install

      - name: Run tests
        run: yarn test
