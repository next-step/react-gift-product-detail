name: Mission 4 Step 3 eodudrepublic CI

on:
  push:
    branches: [ eodudrepublic ]
  pull_request:
    branches: [ eodudrepublic ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: "yarn"

    - name: Install Yarn Package Manager
      run: npm install -g yarn

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Run lint
      run: yarn lint

    - name: Run type check
      run: npx tsc --noEmit

    - name: Run tests
      run: yarn test