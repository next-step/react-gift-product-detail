name: Run Tests on PR or moderator11 Merge

on:
  pull_request:
    branches:
      - moderator11
  push:
    branches:
      - moderator11

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clean and install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps --ignore-scripts=false

      - name: Run tests
        run: npm run test
