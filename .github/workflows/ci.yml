# .github/workflows/ci.yml
name: CI - Test & Lint

on:
  pull_request:
    branches:
      - main
      - skybluesharkk
    types: [opened, synchronize, reopened]

  push:
    branches:
      - main
      - skybluesharkk

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run unit tests
        env:
          CI: true
        run: npm run test -- --run
